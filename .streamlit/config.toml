# Streamlit configuration.
#
# fileWatcherType=none disables auto-reload on file changes. On a network
# share (Z:\), the watcher's constant SMB stat calls add measurable latency
# to every interaction. Harmless on Streamlit Cloud (cloud uses git pushes
# for reloads, not file watching). Local tradeoff: edits to .py files won't
# reload automatically — press R in the browser or click "Rerun" to refresh.
#
# NOTE: port is intentionally NOT set here. Streamlit Cloud requires the
# default port 8501 for its health checks. For local runs on Windows where
# Cursor IDE binds 8501, override via the command line:
#     python -m streamlit run Home.py --server.port 8765

[server]
fileWatcherType = "none"
